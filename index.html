<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID BLADE — Space Roguelike</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a12; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; image-rendering: crisp-edges; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c');
const x = c.getContext('2d');

// Fill viewport
function resize() {
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// State
let state = 'title'; // title | playing | dead
let keys = {};
let frame = 0;

// Player
let P = { x: 0, y: 0, hp: 5, maxHp: 5, sword: 0, facing: 0, speed: 3, slashing: false, slashAngle: 0, slashT: 0, dashT: 0, dashCD: 0, slashCD: 0, invT: 0 };
let enemies = [], particles = [], bullets = [], pickups = [];
let roomNum = 0, score = 0, kills = 0, exitDoor = null, shake = 0;

const SWORDS = [
  { name: 'Plasma Katana', col: '#0ff', dmg: 1, range: 50, spd: 12, arc: 2.2 },
  { name: 'Void Cleaver', col: '#f0f', dmg: 2, range: 65, spd: 20, arc: 3.0 },
  { name: 'Ion Dagger', col: '#ff0', dmg: 1, range: 35, spd: 6, arc: 1.6 },
];

const ETYPES = {
  grunt:   { hp:2, spd:1.2, col:'#3f3', sz:14, dmg:1, pts:10, ai:'chase' },
  spitter: { hp:1, spd:0.6, col:'#0c0', sz:12, dmg:1, pts:15, ai:'ranged' },
  brute:   { hp:5, spd:0.7, col:'#5f5', sz:22, dmg:2, pts:25, ai:'chase' },
  drone:   { hp:2, spd:1.0, col:'#bbb', sz:12, dmg:1, pts:10, ai:'orbit' },
  turret:  { hp:3, spd:0,   col:'#999', sz:16, dmg:1, pts:20, ai:'turret' },
  heavy:   { hp:6, spd:0.5, col:'#ddd', sz:24, dmg:2, pts:30, ai:'chase' },
};

function dist(a,b) { return Math.hypot(b.x-a.x, b.y-a.y); }
function ang(a,b) { return Math.atan2(b.y-a.y, b.x-a.x); }

function spawnP(px, py, col, n, spd) {
  for (let i = 0; i < n; i++) {
    let a = Math.random()*Math.PI*2, s = Math.random()*spd;
    particles.push({ x:px, y:py, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:30+Math.random()*20, col, sz:2+Math.random()*4 });
  }
}

function init() {
  P.x = c.width/2; P.y = c.height/2;
  P.hp = P.maxHp; P.sword = 0; P.facing = 0;
  P.slashing = false; P.dashT = 0; P.dashCD = 0; P.slashCD = 0; P.invT = 0;
  enemies = []; particles = []; bullets = []; pickups = [];
  roomNum = 0; score = 0; kills = 0; exitDoor = null; shake = 0;
  nextRoom();
}

function nextRoom() {
  roomNum++;
  enemies = []; bullets = []; pickups = []; exitDoor = null;
  let n = Math.min(3 + roomNum * 2, 15);
  let types;
  if (roomNum % 5 === 0) {
    // Boss
    let base = roomNum % 2 === 0 ? ETYPES.brute : ETYPES.heavy;
    types = [{ ...base, hp: 12 + roomNum * 2, pts: 100, sz: 40 }];
    n = 1;
  } else if (roomNum % 2 === 0) {
    types = [ETYPES.drone, ETYPES.turret, ETYPES.heavy];
  } else {
    types = [ETYPES.grunt, ETYPES.spitter, ETYPES.brute];
  }
  for (let i = 0; i < n; i++) {
    let t = types[Math.floor(Math.random() * types.length)];
    let ex, ey;
    do {
      ex = 60 + Math.random() * (c.width - 120);
      ey = 60 + Math.random() * (c.height - 120);
    } while (Math.hypot(ex - P.x, ey - P.y) < 120);
    enemies.push({ x:ex, y:ey, ...t, maxHp:t.hp, flash:0, shootT:60+Math.random()*60, orbA:Math.random()*Math.PI*2 });
  }
  P.x = c.width/2; P.y = c.height/2;
}

function update() {
  if (state !== 'playing') return;
  frame++;

  // Input
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy = -1;
  if (keys['s'] || keys['arrowdown']) dy = 1;
  if (keys['a'] || keys['arrowleft']) dx = -1;
  if (keys['d'] || keys['arrowright']) dx = 1;
  if (dx || dy) {
    let l = Math.hypot(dx, dy); dx /= l; dy /= l;
    P.facing = Math.atan2(dy, dx);
  }
  let spd = P.dashT > 0 ? P.speed * 3.5 : P.speed;
  P.x += dx * spd; P.y += dy * spd;
  P.x = Math.max(20, Math.min(c.width - 20, P.x));
  P.y = Math.max(20, Math.min(c.height - 20, P.y));

  if (P.dashT > 0) P.dashT--;
  if (P.dashCD > 0) P.dashCD--;
  if (P.slashCD > 0) P.slashCD--;
  if (P.invT > 0) P.invT--;
  if (shake > 0) shake--;

  // Slash
  if (P.slashing) {
    let sw = SWORDS[P.sword];
    P.slashT += 0.12;
    if (P.slashT >= 1) { P.slashing = false; }
    else {
      let sA = P.slashAngle - sw.arc/2 + sw.arc * P.slashT;
      let tx = P.x + Math.cos(sA) * sw.range;
      let ty = P.y + Math.sin(sA) * sw.range;
      enemies.forEach(e => {
        if (e.hp <= 0) return;
        if (Math.hypot(tx - e.x, ty - e.y) < e.sz + 8) {
          e.hp -= sw.dmg; e.flash = 8;
          let a = ang(P, e);
          e.x += Math.cos(a) * 8; e.y += Math.sin(a) * 8;
          spawnP(e.x, e.y, sw.col, 6, 4); shake = 4;
          if (e.hp <= 0) {
            score += e.pts; kills++;
            spawnP(e.x, e.y, e.col, 20, 5);
            if (Math.random() < 0.15) pickups.push({ x:e.x, y:e.y, type:'sword', sw:Math.floor(Math.random()*3), life:400 });
            if (Math.random() < 0.2) pickups.push({ x:e.x, y:e.y, type:'heal', life:400 });
          }
        }
      });
    }
  }

  // Enemies
  let alive = 0;
  enemies.forEach(e => {
    if (e.hp <= 0) return;
    alive++;
    if (e.flash > 0) e.flash--;
    let a = ang(e, P), d = dist(e, P);

    switch (e.ai) {
      case 'chase':
        if (d > 20) { e.x += Math.cos(a)*e.spd; e.y += Math.sin(a)*e.spd; }
        break;
      case 'ranged':
        if (d < 100) { e.x -= Math.cos(a)*e.spd; e.y -= Math.sin(a)*e.spd; }
        else if (d > 200) { e.x += Math.cos(a)*e.spd*0.5; e.y += Math.sin(a)*e.spd*0.5; }
        e.shootT--;
        if (e.shootT <= 0) {
          bullets.push({ x:e.x, y:e.y, vx:Math.cos(a)*3.5, vy:Math.sin(a)*3.5, life:80, col:'#0f0', dmg:e.dmg });
          e.shootT = 70 + Math.random()*30;
        }
        break;
      case 'orbit':
        e.orbA += 0.025;
        let tx = P.x + Math.cos(e.orbA)*120, ty = P.y + Math.sin(e.orbA)*120;
        e.x += (tx - e.x)*0.03; e.y += (ty - e.y)*0.03;
        e.shootT--;
        if (e.shootT <= 0) {
          bullets.push({ x:e.x, y:e.y, vx:Math.cos(a)*4, vy:Math.sin(a)*4, life:60, col:'#ff0', dmg:e.dmg });
          e.shootT = 50;
        }
        break;
      case 'turret':
        e.shootT--;
        if (e.shootT <= 0) {
          for (let i = -1; i <= 1; i++) {
            let sa = a + i * 0.25;
            bullets.push({ x:e.x, y:e.y, vx:Math.cos(sa)*3, vy:Math.sin(sa)*3, life:80, col:'#f80', dmg:e.dmg });
          }
          e.shootT = 80;
        }
        break;
    }
    e.x = Math.max(e.sz, Math.min(c.width-e.sz, e.x));
    e.y = Math.max(e.sz, Math.min(c.height-e.sz, e.y));

    // Contact damage
    if (P.dashT <= 0 && P.invT <= 0 && d < e.sz + 10) {
      P.hp -= e.dmg; P.invT = 40; shake = 6;
      spawnP(P.x, P.y, '#f00', 12, 4);
      let ka = ang(e, P);
      P.x += Math.cos(ka) * 15; P.y += Math.sin(ka) * 15;
      if (P.hp <= 0) state = 'dead';
    }
  });

  // Room clear
  if (alive === 0 && !exitDoor && enemies.length > 0) {
    exitDoor = { x: c.width - 40, y: c.height / 2 };
  }
  if (exitDoor && Math.hypot(P.x - exitDoor.x, P.y - exitDoor.y) < 25) {
    exitDoor = null;
    nextRoom();
  }

  // Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.x < 0 || b.x > c.width || b.y < 0 || b.y > c.height || b.life <= 0) return false;
    if (P.dashT <= 0 && P.invT <= 0 && Math.hypot(b.x - P.x, b.y - P.y) < 12) {
      P.hp -= b.dmg; P.invT = 25; shake = 4;
      spawnP(P.x, P.y, '#f00', 8, 3);
      if (P.hp <= 0) state = 'dead';
      return false;
    }
    return true;
  });

  // Pickups
  pickups = pickups.filter(p => {
    if (Math.hypot(P.x - p.x, P.y - p.y) < 20) {
      if (p.type === 'sword') { P.sword = p.sw; spawnP(p.x, p.y, SWORDS[p.sw].col, 12, 3); }
      else { P.hp = Math.min(P.maxHp, P.hp + 1); spawnP(p.x, p.y, '#f44', 10, 3); }
      return false;
    }
    p.life--; return p.life > 0;
  });

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vx *= 0.94; p.vy *= 0.94; p.life--;
    return p.life > 0;
  });
}

function draw() {
  let W = c.width, H = c.height;
  let sx = shake > 0 ? (Math.random()-0.5)*shake*3 : 0;
  let sy = shake > 0 ? (Math.random()-0.5)*shake*3 : 0;

  x.save();
  x.translate(sx, sy);

  // Background
  x.fillStyle = '#0a0a12';
  x.fillRect(-10, -10, W+20, H+20);

  // Grid
  x.strokeStyle = '#14141f';
  x.lineWidth = 1;
  for (let gx = 0; gx < W; gx += 40) { x.beginPath(); x.moveTo(gx, 0); x.lineTo(gx, H); x.stroke(); }
  for (let gy = 0; gy < H; gy += 40) { x.beginPath(); x.moveTo(0, gy); x.lineTo(W, gy); x.stroke(); }

  // Walls
  x.fillStyle = '#1a1a2e';
  x.fillRect(0,0,W,8); x.fillRect(0,H-8,W,8);
  x.fillRect(0,0,8,H); x.fillRect(W-8,0,8,H);

  // Exit door
  if (exitDoor) {
    x.fillStyle = frame % 30 < 15 ? '#0ff' : '#066';
    x.fillRect(exitDoor.x-10, exitDoor.y-18, 20, 36);
    x.fillStyle = '#0a0a12';
    x.fillRect(exitDoor.x-6, exitDoor.y-14, 12, 28);
    x.fillStyle = '#0ff';
    x.font = '10px monospace';
    x.fillText('EXIT', exitDoor.x-12, exitDoor.y-22);
  }

  // Pickups
  pickups.forEach(p => {
    let blink = Math.sin(frame * 0.1) > 0;
    if (p.type === 'sword') {
      x.fillStyle = blink ? SWORDS[p.sw].col : '#555';
      x.fillRect(p.x-3, p.y-10, 6, 20);
      x.fillRect(p.x-8, p.y-2, 16, 4);
    } else {
      x.fillStyle = blink ? '#f44' : '#a22';
      x.beginPath(); x.arc(p.x, p.y, 6, 0, Math.PI*2); x.fill();
      x.fillStyle = '#fff';
      x.fillRect(p.x-4, p.y-1, 8, 2);
      x.fillRect(p.x-1, p.y-4, 2, 8);
    }
  });

  // Enemies
  enemies.forEach(e => {
    if (e.hp <= 0) return;
    let col = e.flash > 0 ? '#fff' : e.col;

    // Body
    x.fillStyle = col;
    if (e.ai === 'turret') {
      // Square robot
      x.fillRect(e.x-e.sz/2, e.y-e.sz/2, e.sz, e.sz);
      // Barrel
      let a = ang(e, P);
      x.strokeStyle = col; x.lineWidth = 3;
      x.beginPath(); x.moveTo(e.x, e.y);
      x.lineTo(e.x + Math.cos(a)*e.sz, e.y + Math.sin(a)*e.sz); x.stroke();
    } else {
      x.beginPath(); x.arc(e.x, e.y, e.sz/2, 0, Math.PI*2); x.fill();
    }

    // Eyes
    let ea = ang(e, P);
    if (e.col.startsWith('#') && (e.col[1] >= '0' && e.col[1] <= '5')) {
      // Alien — red eyes
      x.fillStyle = '#f00';
      x.beginPath(); x.arc(e.x + Math.cos(ea-0.3)*e.sz*0.25, e.y + Math.sin(ea-0.3)*e.sz*0.25, 2, 0, Math.PI*2); x.fill();
      x.beginPath(); x.arc(e.x + Math.cos(ea+0.3)*e.sz*0.25, e.y + Math.sin(ea+0.3)*e.sz*0.25, 2, 0, Math.PI*2); x.fill();
    } else {
      // Robot — blue LED
      x.fillStyle = '#08f';
      x.beginPath(); x.arc(e.x + Math.cos(ea)*e.sz*0.2, e.y + Math.sin(ea)*e.sz*0.2, 3, 0, Math.PI*2); x.fill();
    }

    // HP bar
    if (e.hp < e.maxHp) {
      let bw = e.sz + 6;
      x.fillStyle = '#300';
      x.fillRect(e.x - bw/2, e.y - e.sz/2 - 10, bw, 4);
      x.fillStyle = '#f00';
      x.fillRect(e.x - bw/2, e.y - e.sz/2 - 10, bw * (e.hp/e.maxHp), 4);
    }
  });

  // Bullets
  bullets.forEach(b => {
    x.fillStyle = b.col;
    x.shadowColor = b.col; x.shadowBlur = 8;
    x.beginPath(); x.arc(b.x, b.y, 4, 0, Math.PI*2); x.fill();
    x.shadowBlur = 0;
  });

  // Player
  if (!(P.invT > 0 && frame % 4 < 2)) {
    // Body
    x.fillStyle = P.dashT > 0 ? '#88f' : '#48f';
    x.beginPath(); x.arc(P.x, P.y, 10, 0, Math.PI*2); x.fill();
    // Visor
    x.fillStyle = '#0ff';
    let vx = Math.cos(P.facing)*6, vy = Math.sin(P.facing)*6;
    x.fillRect(P.x+vx-3, P.y+vy-2, 6, 4);
    // Outline
    x.strokeStyle = '#28f'; x.lineWidth = 2;
    x.beginPath(); x.arc(P.x, P.y, 10, 0, Math.PI*2); x.stroke();
  }

  // Slash arc
  if (P.slashing) {
    let sw = SWORDS[P.sword];
    let startA = P.slashAngle - sw.arc/2;
    let curA = startA + sw.arc * P.slashT;
    
    x.strokeStyle = sw.col; x.lineWidth = 3;
    x.shadowColor = sw.col; x.shadowBlur = 12;
    x.beginPath();
    x.arc(P.x, P.y, sw.range, startA, curA);
    x.stroke();

    // Tip
    let tx = P.x + Math.cos(curA)*sw.range;
    let ty = P.y + Math.sin(curA)*sw.range;
    x.fillStyle = sw.col;
    x.beginPath(); x.arc(tx, ty, 5, 0, Math.PI*2); x.fill();
    x.shadowBlur = 0;

    // Trail particles
    spawnP(tx, ty, sw.col, 1, 1);
  }

  // Particles
  particles.forEach(p => {
    x.globalAlpha = Math.min(1, p.life / 20);
    x.fillStyle = p.col;
    x.fillRect(p.x - p.sz/2, p.y - p.sz/2, p.sz, p.sz);
  });
  x.globalAlpha = 1;

  x.restore();

  // === HUD (not affected by shake) ===
  // HP
  x.font = 'bold 20px monospace';
  for (let i = 0; i < P.maxHp; i++) {
    x.fillStyle = i < P.hp ? '#f44' : '#333';
    x.fillText('♥', 15 + i * 26, 30);
  }

  // Sword
  let sw = SWORDS[P.sword];
  x.fillStyle = sw.col; x.font = 'bold 16px monospace';
  x.fillText('⚔ ' + sw.name, 15, 55);

  // Room
  let roomLabel = 'ROOM ' + roomNum;
  if (roomNum % 5 === 0) roomLabel += ' — BOSS';
  else if (roomNum % 2 === 0) roomLabel += ' — ROBOTS';
  else roomLabel += ' — ALIENS';
  x.fillStyle = '#0f0'; x.font = 'bold 14px monospace';
  x.fillText(roomLabel, 15, 78);

  // Score
  x.fillStyle = '#888'; x.font = '13px monospace';
  x.fillText('SCORE: ' + score + '  KILLS: ' + kills, 15, 98);

  // Room clear message
  if (exitDoor) {
    x.fillStyle = '#0ff'; x.font = 'bold 22px monospace';
    x.shadowColor = '#0ff'; x.shadowBlur = 10;
    let txt = '>> ROOM CLEAR — FIND THE EXIT >>';
    x.fillText(txt, W/2 - x.measureText(txt).width/2, 40);
    x.shadowBlur = 0;
  }

  // === SCREENS ===
  if (state === 'title') {
    x.fillStyle = 'rgba(10,10,18,0.95)'; x.fillRect(0, 0, W, H);
    
    x.shadowColor = '#0ff'; x.shadowBlur = 30;
    x.fillStyle = '#0ff'; x.font = 'bold 64px monospace';
    let title = 'VOID BLADE';
    x.fillText(title, W/2 - x.measureText(title).width/2, H/2 - 100);
    x.shadowBlur = 0;

    x.fillStyle = '#0ff'; x.font = '20px monospace';
    let sub = 'A Space Roguelike';
    x.fillText(sub, W/2 - x.measureText(sub).width/2, H/2 - 60);

    x.fillStyle = '#888'; x.font = '16px monospace';
    let controls = [
      'WASD / Arrows — Move',
      'SPACE — Sword Slash',
      'SHIFT — Dash (invincible)',
      '1 / 2 / 3 — Switch Sword',
    ];
    controls.forEach((t, i) => {
      x.fillText(t, W/2 - x.measureText(t).width/2, H/2 - 10 + i * 24);
    });

    if (Math.sin(frame * 0.06) > 0) {
      x.fillStyle = '#0f0'; x.font = 'bold 20px monospace';
      let start = '[ CLICK OR PRESS ENTER ]';
      x.fillText(start, W/2 - x.measureText(start).width/2, H/2 + 120);
    }
  }

  if (state === 'dead') {
    x.fillStyle = 'rgba(0,0,0,0.8)'; x.fillRect(0, 0, W, H);
    
    x.fillStyle = '#f00'; x.font = 'bold 52px monospace';
    let d1 = 'YOU DIED';
    x.fillText(d1, W/2 - x.measureText(d1).width/2, H/2 - 40);

    x.fillStyle = '#888'; x.font = '18px monospace';
    let d2 = 'Room ' + roomNum + ' — ' + kills + ' kills — Score: ' + score;
    x.fillText(d2, W/2 - x.measureText(d2).width/2, H/2 + 10);

    if (Math.sin(frame * 0.06) > 0) {
      x.fillStyle = '#0f0'; x.font = 'bold 20px monospace';
      let r = '[ CLICK OR PRESS ENTER TO RETRY ]';
      x.fillText(r, W/2 - x.measureText(r).width/2, H/2 + 60);
    }
  }
}

function startGame() {
  if (state === 'title' || state === 'dead') {
    state = 'playing';
    init();
  }
}

function loop() {
  frame++;
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'Enter') startGame();
  if (state === 'playing') {
    if (e.key === ' ' && P.slashCD <= 0 && !P.slashing) {
      P.slashing = true; P.slashAngle = P.facing; P.slashT = 0;
      P.slashCD = SWORDS[P.sword].spd;
    }
    if (e.key === 'Shift' && P.dashCD <= 0) {
      P.dashT = 10; P.dashCD = 50;
      spawnP(P.x, P.y, '#88f', 8, 2);
    }
    if (e.key === '1') P.sword = 0;
    if (e.key === '2') P.sword = 1;
    if (e.key === '3') P.sword = 2;
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});

window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
c.addEventListener('click', startGame);

loop();
</script>
</body>
</html>
